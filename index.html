<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .nav-btn.active { color: #4f46e5; border-top: 3px solid #4f46e5; margin-top: -3px; }
        .nav-btn:not(.active) { color: #94a3b8; }
        .workout-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th, td { white-space: nowrap; border-bottom: 1px solid #f1f5f9; padding: 12px 10px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #f1f5f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24">

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-6 rounded-b-[2.5rem] shadow-xl mb-6 sticky top-0 z-30">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 id="viewTitle" class="text-2xl font-bold">Planer</h1>
                <p id="todayDate" class="text-indigo-200 text-sm font-medium">Ładowanie...</p>
            </div>
            <div id="connectionStatus" class="bg-slate-600 p-2 px-3 rounded-full text-[10px] font-bold border border-white/20 uppercase tracking-widest text-white shadow-lg">Inicjalizacja...</div>
        </div>
        
        <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md">
            <div class="flex justify-between items-center mb-1">
                <p class="text-[10px] uppercase tracking-wider text-indigo-100 font-bold">Postęp dnia</p>
                <span id="progressText" class="text-sm font-black">0%</span>
            </div>
            <div class="w-full bg-white/20 h-2.5 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-white h-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="px-4 max-w-lg mx-auto lg:max-w-full">
        <!-- Dashboard -->
        <section id="view-dashboard" class="view-section active space-y-6">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-5">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="currentMonthYear" class="font-bold text-lg text-slate-800"></h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-xl transition-colors"><i class="fas fa-chevron-left text-slate-400"></i></button>
                        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-xl transition-colors"><i class="fas fa-chevron-right text-slate-400"></i></button>
                    </div>
                </div>
                <div id="calendarDays" class="grid grid-cols-7 gap-2"></div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-5">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-layer-group text-indigo-500"></i> Baza zadań</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="dbInput" placeholder="Nowy szablon..." class="flex-1 bg-slate-50 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 ring-indigo-500 outline-none">
                    <button onclick="addToDatabase()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-95"><i class="fas fa-plus"></i></button>
                </div>
                <div id="dutyDatabase" class="flex flex-wrap gap-2"></div>
            </div>
        </section>

        <!-- Trening (Inne widoki pominięte dla zwięzłości, zostają te same co wcześniej) -->
        <section id="view-workout" class="view-section">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 text-center">
                <i class="fas fa-dumbbell text-4xl text-slate-200 mb-4"></i>
                <p class="text-slate-500 font-medium">Moduł treningowy ładowany...</p>
            </div>
        </section>
        
        <section id="view-generic" class="view-section">
             <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 text-center">
                <i class="fas fa-chart-line text-4xl text-slate-200 mb-4"></i>
                <p class="text-slate-500 font-medium">Moduł statystyk ładowany...</p>
            </div>
        </section>
    </main>

    <!-- Nawigacja -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t px-2 flex justify-around items-center z-40 h-20 shadow-lg">
        <button onclick="switchView('dashboard')" class="nav-btn active flex flex-col items-center justify-center gap-1 w-full h-full" data-view="dashboard"><i class="fas fa-calendar-check text-xl"></i><span class="text-[9px] font-black uppercase">Planer</span></button>
        <button onclick="switchView('workout')" class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full" data-view="workout"><i class="fas fa-dumbbell text-xl"></i><span class="text-[9px] font-black uppercase">Trening</span></button>
        <button onclick="switchView('reading')" class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full" data-view="reading"><i class="fas fa-book-open text-xl"></i><span class="text-[9px] font-black uppercase">Czytanie</span></button>
        <button onclick="switchView('steps')" class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full" data-view="steps"><i class="fas fa-shoe-prints text-xl"></i><span class="text-[9px] font-black uppercase">Kroki</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Globalny stan aplikacji
        let state = {
            dutyDB: ["Praca", "Trening", "Nauka"],
            calendar: {},
            reading: {}, steps: {}, diet: {}, measure: {}, 
            workout: { currentPlan: 1, plans: { 1: { exercises: [] }, 2: { exercises: [] } } }
        };

        let user = null;
        let db = null;
        let auth = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'life-planner-v1';

        // --- FUNKCJA INICJALIZUJĄCA FIREBASE ---
        const startFirebase = async (config) => {
            const statusBadge = document.getElementById('connectionStatus');
            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                // Auth
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        statusBadge.innerText = 'Online';
                        statusBadge.className = "bg-emerald-500 p-2 px-3 rounded-full text-[10px] font-bold border border-white/20 uppercase tracking-widest text-white shadow-lg";
                        
                        // Synchronizacja danych
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'main');
                        onSnapshot(docRef, (snap) => {
                            if (snap.exists()) {
                                state = snap.data();
                            } else {
                                save(); // Pierwszy zapis domyślnego stanu
                            }
                            renderAll();
                        });
                    }
                });
            } catch (e) {
                console.error("Firebase init failed:", e);
                statusBadge.innerText = 'Błąd Połączenia';
            }
        };

        // --- BEZPIECZNE OCZEKIWANIE NA KONFIGURACJĘ ---
        const waitForConfig = () => {
            const statusBadge = document.getElementById('connectionStatus');
            let attempts = 0;
            
            const check = setInterval(() => {
                attempts++;
                let configFound = false;
                let currentConfig = null;

                try {
                    if (typeof __firebase_config !== 'undefined') {
                        currentConfig = JSON.parse(__firebase_config);
                        configFound = true;
                    }
                } catch (e) {}

                if (configFound) {
                    clearInterval(check);
                    startFirebase(currentConfig);
                } else if (attempts > 20) { // Po 10 sekundach (20 * 500ms) przestań szukać
                    clearInterval(check);
                    statusBadge.innerText = 'Błąd Konfiguracji';
                    renderAll(); // Uruchom w trybie offline (tylko sesja)
                }
            }, 500);
        };

        // Inicjalizacja przy ładowaniu strony
        window.addEventListener('load', () => {
            document.getElementById('todayDate').innerText = "Dzisiaj, " + new Date().toLocaleDateString('pl-PL', {day:'numeric', month:'long'});
            waitForConfig();
        });

        // --- FUNKCJE GLOBALNE ---
        window.save = async () => {
            if (!user || !db || !state) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'main'), state);
            } catch (e) { console.error("Save error:", e); }
        };

        window.renderAll = () => {
            // Tutaj wywołaj wszystkie funkcje renderujące (Calendar, Workout itp.)
            renderCalendar();
            updateProgressBar();
        };

        // Reszta logiki UI (renderCalendar, changeMonth, switchView itp.)
        // [Zachowaj logikę z poprzedniego pliku dla renderowania]
        
        function updateProgressBar() {
            const todayStr = new Date().toISOString().split('T')[0];
            const tasks = state.calendar[todayStr] || [];
            const done = tasks.filter(t => t.done).length;
            const p = tasks.length ? Math.round((done/tasks.length)*100) : 0;
            document.getElementById('progressBar').style.width = p + '%';
            document.getElementById('progressText').innerText = p + '%';
        }

        let currentMonth = new Date();
        function renderCalendar() {
            const cont = document.getElementById('calendarDays');
            if(!cont) return;
            const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
            const names = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('currentMonthYear').innerText = `${names[m]} ${y}`;
            cont.innerHTML = '';
            
            const firstDay = new Date(y, m, 1).getDay();
            const offset = firstDay === 0 ? 6 : firstDay - 1;
            for(let i=0; i<offset; i++) cont.innerHTML += '<div></div>';
            
            const daysInMonth = new Date(y, m+1, 0).getDate();
            for(let d=1; d<=daysInMonth; d++) {
                const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasTasks = state.calendar[dateKey] && state.calendar[dateKey].length > 0;
                cont.innerHTML += `
                    <div class="h-14 rounded-2xl border border-slate-100 flex flex-col items-center justify-center bg-white">
                        <span class="text-xs font-bold">${d}</span>
                        ${hasTasks ? '<div class="w-1 h-1 bg-indigo-500 rounded-full mt-1"></div>' : ''}
                    </div>
                `;
            }
        }
        
        window.changeMonth = (dir) => { currentMonth.setMonth(currentMonth.getMonth() + dir); renderCalendar(); };
        window.switchView = (v) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${v === 'dashboard' ? 'dashboard' : (v === 'workout' ? 'workout' : 'generic')}`).classList.add('active');
            document.querySelector(`[data-view="${v}"]`)?.classList.add('active');
            document.getElementById('viewTitle').innerText = v.charAt(0).toUpperCase() + v.slice(1);
        };
    </script>
</body>
</html>
