<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Planner - Advanced Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .nav-btn.active { color: #818cf8; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .workout-table-container { overflow-x: auto; }
        input, select { background: rgba(15, 23, 42, 0.6) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <!-- HEADER -->
    <header class="p-6 sticky top-0 z-30 bg-[#0f172a]/80 backdrop-blur-md border-b border-white/5">
        <div class="flex justify-between items-center mb-4">
            <h1 id="viewTitle" class="text-2xl font-black italic tracking-tighter uppercase text-indigo-400">PLANER</h1>
            <div id="connectionStatus" class="w-2 h-2 rounded-full bg-amber-500"></div>
        </div>
        <div class="glass-card p-3 rounded-xl">
            <div class="flex justify-between text-[10px] mb-1 font-bold uppercase tracking-widest text-slate-400">
                <span>Dzienny Cel</span>
                <span id="progressText">0%</span>
            </div>
            <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-indigo-500 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-6">
        
        <!-- DASHBOARD / PLANER -->
        <section id="view-dashboard" class="view-section active space-y-6">
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="currentMonthYear" class="font-black text-lg uppercase tracking-tight"></h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-2 hover:bg-white/5 rounded-lg"><i class="fas fa-chevron-left text-slate-400"></i></button>
                        <button onclick="changeMonth(1)" class="p-2 hover:bg-white/5 rounded-lg"><i class="fas fa-chevron-right text-slate-400"></i></button>
                    </div>
                </div>
                <div id="calendarDays" class="grid grid-cols-7 gap-2"></div>
            </div>

            <div class="glass-card rounded-2xl p-5">
                <h3 class="font-bold text-xs uppercase text-slate-500 mb-4 tracking-widest">Baza Zadań</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="dbInput" placeholder="Szybki zapis..." class="flex-1 rounded-xl px-4 py-3 text-sm focus:ring-1 ring-indigo-500 outline-none">
                    <button onclick="addToDatabase()" class="bg-indigo-600 text-white px-5 rounded-xl"><i class="fas fa-plus"></i></button>
                </div>
                <div id="dutyDatabase" class="flex flex-wrap gap-2"></div>
            </div>
        </section>

        <!-- TRENING -->
        <section id="view-workout" class="view-section space-y-6">
            <div class="glass-card rounded-2xl p-6">
                <div class="flex gap-2 mb-6 p-1 bg-slate-900/50 rounded-xl">
                    <button onclick="switchWorkoutPlan(1)" id="btnPlan1" class="flex-1 py-2 rounded-lg font-bold text-xs transition-all">PLAN A</button>
                    <button onclick="switchWorkoutPlan(2)" id="btnPlan2" class="flex-1 py-2 rounded-lg font-bold text-xs transition-all">PLAN B</button>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="date" id="workoutDateInput" class="w-full rounded-lg px-3 py-2 text-sm">
                    <button onclick="addExercise()" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold text-xs">DODAJ ĆWICZENIE</button>
                </div>
                <input type="text" id="exerciseInput" placeholder="Nazwa ćwiczenia..." class="w-full rounded-lg px-3 py-2 text-sm mb-4">
                
                <div class="workout-table-container rounded-xl border border-white/5">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-white/5">
                            <tr id="workoutTableHead">
                                <th class="p-3">ĆWICZENIE</th>
                            </tr>
                        </thead>
                        <tbody id="workoutTableBody"></tbody>
                    </table>
                </div>
                <button onclick="saveWorkoutSession()" class="w-full mt-6 bg-indigo-600 text-white py-4 rounded-xl font-bold">ZAPISZ SESJĘ</button>
            </div>
        </section>

        <!-- CZYTANIE (Rozdzielone) -->
        <section id="view-reading" class="view-section space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="text-xs font-black uppercase text-indigo-400 mb-4">Postęp (Strony)</h3>
                    <input type="number" id="readingPageInput" placeholder="Ile stron dzisiaj?" class="w-full rounded-xl px-4 py-3 mb-3 text-sm">
                    <button onclick="logReading()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">ZAPISZ STRONY</button>
                    <div id="readingHistory" class="mt-6 space-y-2 max-h-48 overflow-y-auto"></div>
                </div>
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="text-xs font-black uppercase text-emerald-400 mb-4">Biblioteka (Ukończone)</h3>
                    <input type="text" id="libraryTitleInput" placeholder="Tytuł książki..." class="w-full rounded-xl px-4 py-3 mb-3 text-sm">
                    <button onclick="addToLibrary()" class="w-full bg-slate-700 text-white py-3 rounded-xl font-bold">DODAJ DO PRZECZYTANYCH</button>
                    <div id="libraryList" class="mt-6 space-y-2 max-h-48 overflow-y-auto"></div>
                </div>
            </div>
        </section>

        <!-- STATYSTYKI (Advanced Analytics) -->
        <section id="view-stats" class="view-section space-y-6">
            <div class="glass-card rounded-2xl p-6 flex flex-wrap justify-between items-center gap-4">
                <h2 class="text-xl font-black italic">ANALYTICS</h2>
                <div class="flex gap-2">
                    <select id="statsYearFilter" onchange="renderStats()" class="p-2 rounded-lg text-xs font-bold"></select>
                    <select id="statsMonthFilter" onchange="renderStats()" class="p-2 rounded-lg text-xs font-bold">
                        <option value="all">Cały rok</option>
                        <option value="01">Styczeń</option><option value="02">Luty</option><option value="03">Marzec</option>
                        <option value="04">Kwiecień</option><option value="05">Maj</option><option value="06">Czerwiec</option>
                        <option value="07">Lipiec</option><option value="08">Sierpień</option><option value="09">Wrzesień</option>
                        <option value="10">Październik</option><option value="11">Listopad</option><option value="12">Grudzień</option>
                    </select>
                </div>
            </div>

            <div id="statsGrid" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>

            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest">Wykres Trendów</h3>
                <canvas id="statsChart" height="150"></canvas>
            </div>

            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest">Rekordy Życiowe (PB)</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="text-slate-500">
                                <th class="pb-3">ĆWICZENIE</th>
                                <th class="pb-3 text-center">MAX (KG)</th>
                                <th class="pb-3 text-right">DATA</th>
                            </tr>
                        </thead>
                        <tbody id="pbTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- DIETA / KROKI / POMIARY (Standardowe karty) -->
        <section id="view-steps" class="view-section">
            <div class="glass-card rounded-3xl p-10 text-center">
                <i class="fas fa-shoe-prints text-4xl text-indigo-500 mb-4"></i>
                <h3 class="text-5xl font-black mb-2" id="currentStepsDisplay">0</h3>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6">Kroków dzisiaj</p>
                <div class="flex gap-2 max-w-xs mx-auto">
                    <input type="number" id="stepsInput" placeholder="Wynik..." class="flex-1 rounded-xl p-3 text-center font-bold">
                    <button onclick="logSteps()" class="bg-indigo-600 px-6 rounded-xl font-bold text-sm">ZAPISZ</button>
                </div>
            </div>
            <div id="stepsHistory" class="mt-6 space-y-2"></div>
        </section>

        <section id="view-diet" class="view-section space-y-6">
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-xs font-black uppercase text-slate-500 mb-4">Log kalorii</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="number" id="dietKcalInput" placeholder="kcal" class="w-full rounded-xl p-4 text-sm font-bold">
                    <input type="number" id="dietProteinInput" placeholder="białko g" class="w-full rounded-xl p-4 text-sm font-bold">
                </div>
                <button onclick="logDiet()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">DODAJ WPIS</button>
            </div>
            <div id="dietHistory" class="space-y-2"></div>
        </section>

        <section id="view-measure" class="view-section space-y-6">
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-xs font-black uppercase text-slate-500 mb-6 text-center">Pomiary Sylwetki</h3>
                <div class="grid grid-cols-3 gap-4 mb-4">
                    <input type="number" step="0.1" id="weightInput" placeholder="Waga" class="w-full rounded-lg p-3 text-center font-black">
                    <input type="number" step="0.1" id="fatInput" placeholder="Tłuszcz %" class="w-full rounded-lg p-3 text-center font-black">
                    <input type="number" step="0.1" id="muscleInput" placeholder="Mięśnie %" class="w-full rounded-lg p-3 text-center font-black">
                </div>
                <button onclick="logMeasure()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">ZAPISZ POMIAR</button>
            </div>
            <div id="measureHistory" class="space-y-2"></div>
        </section>

    </main>

    <!-- NAVBAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f172a]/90 backdrop-blur-xl border-t border-white/5 px-2 py-4 flex justify-around items-center z-40">
        <button onclick="switchView('dashboard')" class="nav-btn active flex flex-col items-center gap-1 flex-1" data-view="dashboard"><i class="fas fa-calendar-alt"></i><span class="text-[8px] font-bold">PLANER</span></button>
        <button onclick="switchView('workout')" class="nav-btn flex flex-col items-center gap-1 flex-1" data-view="workout"><i class="fas fa-dumbbell"></i><span class="text-[8px] font-bold">TRENING</span></button>
        <button onclick="switchView('reading')" class="nav-btn flex flex-col items-center gap-1 flex-1" data-view="reading"><i class="fas fa-book"></i><span class="text-[8px] font-bold">CZYTANIE</span></button>
        <button onclick="switchView('stats')" class="nav-btn flex flex-col items-center gap-1 flex-1" data-view="stats"><i class="fas fa-chart-line"></i><span class="text-[8px] font-bold">STATS</span></button>
        <button onclick="switchView('steps')" class="nav-btn flex flex-col items-center gap-1 flex-1" data-view="steps"><i class="fas fa-running"></i><span class="text-[8px] font-bold">KROKI</span></button>
        <button onclick="switchView('diet')" class="nav-btn flex flex-col items-center gap-1 flex-1" data-view="diet"><i class="fas fa-apple-alt"></i><span class="text-[8px] font-bold">DIETA</span></button>
        <button onclick="switchView('measure')" class="nav-btn flex flex-col items-center gap-1 flex-1" data-view="measure"><i class="fas fa-weight"></i><span class="text-[8px] font-bold">POMIARY</span></button>
    </nav>

    <!-- TASK MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="glass-card rounded-3xl p-6 w-full max-w-sm">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modalDateDisplay" class="font-black italic text-indigo-400"></h3>
                <button onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="selectedDayTasks" class="space-y-2 mb-6 max-h-48 overflow-y-auto"></div>
            <div class="space-y-3">
                <select id="modalDutySelect" onchange="addFromDB(this.value)" class="w-full rounded-xl p-3 text-xs"></select>
                <div class="flex gap-2">
                    <input type="text" id="customTaskInput" placeholder="Nowe zadanie..." class="flex-1 rounded-xl p-3 text-xs">
                    <button onclick="addTaskToDay()" class="bg-indigo-600 px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'life-planner-v2';

        let user = null;
        let state = {
            dutyDB: [], calendar: {}, steps: {}, diet: { logs: {} }, measure: {},
            reading: { logs: {}, library: [] },
            workout: { currentPlan: 1, plans: { 1: { exercises: [] }, 2: { exercises: [] } } }
        };

        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        };
        initAuth();

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('connectionStatus').classList.replace('bg-amber-500', 'bg-emerald-500');
                setupListener();
            }
        });

        function setupListener() {
            if (!user) return;
            onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'main'), (snap) => {
                if (snap.exists()) {
                    state = { ...state, ...snap.data() };
                    // Migracja starego formatu czytania jeśli istnieje
                    if(typeof state.reading === 'string' || Array.isArray(state.reading)) {
                        state.reading = { logs: {}, library: [] };
                    }
                    renderAll();
                }
            });
        }

        async function save() {
            if (!user) return;
            await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'main'), state);
        }

        // VIEW NAVIGATION
        window.switchView = (v) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
            document.getElementById('viewTitle').innerText = v.toUpperCase();
            if(v === 'stats') renderStats();
            if(v === 'workout') renderWorkout();
        };

        // CALENDAR
        let currentMonth = new Date();
        window.changeMonth = (dir) => { currentMonth.setMonth(currentMonth.getMonth() + dir); renderCalendar(); };
        function renderCalendar() {
            const cont = document.getElementById('calendarDays');
            const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
            const monthNames = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('currentMonthYear').innerText = `${monthNames[m]} ${y}`;
            cont.innerHTML = '';
            const first = new Date(y, m, 1).getDay();
            const offset = first === 0 ? 6 : first - 1;
            for(let i=0; i<offset; i++) cont.innerHTML += '<div></div>';
            for(let d=1; d<=new Date(y, m+1, 0).getDate(); d++) {
                const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const t = state.calendar[key] || [];
                const isToday = key === new Date().toISOString().split('T')[0];
                const doneCount = t.filter(x => x.done).length;
                cont.innerHTML += `
                    <div onclick="openModal('${key}')" class="h-12 border border-white/5 rounded-lg flex flex-col items-center justify-center cursor-pointer ${isToday ? 'bg-indigo-500/20 border-indigo-500' : 'bg-white/5'}">
                        <span class="text-[10px] font-bold ${t.length ? 'text-indigo-400' : 'text-slate-500'}">${d}</span>
                        <div class="flex gap-0.5 mt-1">
                            ${t.slice(0,3).map(x => `<div class="w-1 h-1 rounded-full ${x.done?'bg-emerald-400':'bg-slate-600'}"></div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        // TASKS
        let activeDateKey = null;
        window.openModal = (k) => { activeDateKey = k; document.getElementById('modalDateDisplay').innerText = k; renderModalTasks(); document.getElementById('modal').classList.remove('hidden'); };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.addTaskToDay = () => {
            const val = document.getElementById('customTaskInput').value;
            if(val) {
                if(!state.calendar[activeDateKey]) state.calendar[activeDateKey] = [];
                state.calendar[activeDateKey].push({title: val, done: false});
                save(); renderModalTasks(); document.getElementById('customTaskInput').value = '';
            }
        };
        window.addFromDB = (val) => {
            if(!val) return;
            if(!state.calendar[activeDateKey]) state.calendar[activeDateKey] = [];
            state.calendar[activeDateKey].push({title: val, done: false});
            save(); renderModalTasks(); document.getElementById('modalDutySelect').value = "";
        };
        window.toggleTask = (i) => { state.calendar[activeDateKey][i].done = !state.calendar[activeDateKey][i].done; save(); renderModalTasks(); };
        window.deleteTask = (i) => { state.calendar[activeDateKey].splice(i, 1); save(); renderModalTasks(); };
        function renderModalTasks() {
            const tasks = state.calendar[activeDateKey] || [];
            document.getElementById('selectedDayTasks').innerHTML = tasks.map((t, i) => `
                <div class="flex items-center gap-3 bg-white/5 p-3 rounded-xl border border-white/5">
                    <div onclick="toggleTask(${i})" class="w-5 h-5 rounded border border-white/20 flex items-center justify-center cursor-pointer ${t.done?'bg-emerald-500':''}">
                        ${t.done ? '<i class="fas fa-check text-[10px]"></i>' : ''}
                    </div>
                    <span class="flex-1 text-xs ${t.done?'line-through opacity-40':''}">${t.title}</span>
                    <button onclick="deleteTask(${i})" class="text-slate-500"><i class="fas fa-trash-alt"></i></button>
                </div>`).join('');
        }
        window.addToDatabase = () => { const v = document.getElementById('dbInput').value; if(v){ state.dutyDB.push(v); save(); document.getElementById('dbInput').value = ''; } };

        // WORKOUT
        window.switchWorkoutPlan = (p) => { state.workout.currentPlan = p; renderWorkout(); };
        window.addExercise = () => {
            const n = document.getElementById('exerciseInput').value;
            if(n) { state.workout.plans[state.workout.currentPlan].exercises.push({name: n, history: {}}); save(); document.getElementById('exerciseInput').value = ''; renderWorkout(); }
        };
        window.saveWorkoutSession = () => {
            const date = document.getElementById('workoutDateInput').value || new Date().toISOString().split('T')[0];
            const p = state.workout.plans[state.workout.currentPlan];
            p.exercises.forEach((ex, i) => {
                const sets = [];
                for(let s=0; s<5; s++) {
                    const w = document.getElementById(`weight-${i}-${s}`)?.value;
                    const r = document.getElementById(`reps-${i}-${s}`)?.value;
                    if(w || r) sets.push({w: parseFloat(w)||0, r: parseInt(r)||0});
                }
                if(sets.length) ex.history[date] = sets;
            });
            save(); renderWorkout();
        };
        function renderWorkout() {
            const cp = state.workout.currentPlan;
            document.getElementById('btnPlan1').className = cp === 1 ? "flex-1 py-2 rounded-lg font-bold text-xs bg-indigo-600" : "flex-1 py-2 rounded-lg font-bold text-xs";
            document.getElementById('btnPlan2').className = cp === 2 ? "flex-1 py-2 rounded-lg font-bold text-xs bg-indigo-600" : "flex-1 py-2 rounded-lg font-bold text-xs";
            const selDate = document.getElementById('workoutDateInput').value || new Date().toISOString().split('T')[0];
            const exercises = state.workout.plans[cp].exercises;
            const body = document.getElementById('workoutTableBody');
            body.innerHTML = exercises.map((ex, i) => `
                <tr class="border-b border-white/5">
                    <td class="p-3 font-bold text-indigo-400">${ex.name}</td>
                    <td class="p-3">
                        <div class="grid grid-cols-4 gap-1">
                            ${[0,1,2,3].map(s => `
                                <div class="space-y-1">
                                    <input id="weight-${i}-${s}" type="number" step="0.1" value="${ex.history[selDate]?.[s]?.w || ''}" placeholder="kg" class="w-full p-1 text-[8px] rounded">
                                    <input id="reps-${i}-${s}" type="number" value="${ex.history[selDate]?.[s]?.r || ''}" placeholder="r" class="w-full p-1 text-[8px] rounded">
                                </div>`).join('')}
                        </div>
                    </td>
                </tr>`).join('');
        }

        // READING (Rozdzielone)
        window.logReading = () => {
            const p = parseInt(document.getElementById('readingPageInput').value);
            if(p) {
                const d = new Date().toISOString().split('T')[0];
                state.reading.logs[d] = (state.reading.logs[d] || 0) + p;
                save(); document.getElementById('readingPageInput').value = '';
            }
        };
        window.addToLibrary = () => {
            const t = document.getElementById('libraryTitleInput').value;
            if(t) {
                state.reading.library.push({title: t, date: new Date().toISOString().split('T')[0]});
                save(); document.getElementById('libraryTitleInput').value = '';
            }
        };

        // ANALYTICS ENGINE
        let chartInstance = null;
        window.renderStats = () => {
            const year = document.getElementById('statsYearFilter').value;
            const month = document.getElementById('statsMonthFilter').value;
            const filter = (obj) => Object.entries(obj).filter(([d]) => d.startsWith(year) && (month === 'all' || d.split('-')[1] === month));
            
            const stepsF = filter(state.steps);
            const readingF = filter(state.reading.logs);
            const dietF = filter(state.diet.logs);
            
            const totalPages = readingF.reduce((a,b) => a+b[1], 0);
            const totalSteps = stepsF.reduce((a,b) => a+b[1], 0);
            const avgKcal = dietF.length ? Math.round(dietF.reduce((a,b) => a+b[1].kcal, 0) / dietF.length) : 0;

            document.getElementById('statsGrid').innerHTML = `
                <div class="glass-card p-4 rounded-xl border-l-4 border-indigo-500">
                    <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Strony</p>
                    <p class="text-xl font-black">${totalPages}</p>
                </div>
                <div class="glass-card p-4 rounded-xl border-l-4 border-emerald-500">
                    <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Kroki</p>
                    <p class="text-xl font-black">${totalSteps.toLocaleString()}</p>
                </div>
                <div class="glass-card p-4 rounded-xl border-l-4 border-amber-500">
                    <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Śr. Kcal</p>
                    <p class="text-xl font-black">${avgKcal}</p>
                </div>`;

            // PB Table
            const pbs = {};
            [1,2].forEach(p => state.workout.plans[p].exercises.forEach(ex => {
                Object.entries(ex.history).forEach(([d, s]) => s.forEach(set => {
                    if(!pbs[ex.name] || set.w > pbs[ex.name].w) pbs[ex.name] = {w: set.w, d: d};
                }));
            }));
            document.getElementById('pbTableBody').innerHTML = Object.entries(pbs).map(([n, d]) => `
                <tr class="border-b border-white/5">
                    <td class="py-2 font-bold text-indigo-400">${n}</td>
                    <td class="py-2 text-center font-black">${d.w} kg</td>
                    <td class="py-2 text-right text-[10px] text-slate-500 font-mono">${d.d}</td>
                </tr>`).join('');

            // Chart
            const ctx = document.getElementById('statsChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            const last7 = stepsF.slice(-7);
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7.map(x => x[0].slice(5)),
                    datasets: [{ label: 'Kroki', data: last7.map(x => x[1]), borderColor: '#818cf8', tension: 0.4 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
            });
        };

        // OTHER LOGS
        window.logSteps = () => { const v = parseInt(document.getElementById('stepsInput').value); if(v){ state.steps[new Date().toISOString().split('T')[0]] = v; save(); document.getElementById('stepsInput').value = ''; } };
        window.logDiet = () => { const k = parseInt(document.getElementById('dietKcalInput').value)||0, p = parseInt(document.getElementById('dietProteinInput').value)||0, d = new Date().toISOString().split('T')[0]; if(!state.diet.logs[d]) state.diet.logs[d] = {kcal:0, protein:0}; state.diet.logs[d].kcal += k; state.diet.logs[d].protein += p; save(); document.getElementById('dietKcalInput').value=''; document.getElementById('dietProteinInput').value=''; };
        window.logMeasure = () => { const w = document.getElementById('weightInput').value, f = document.getElementById('fatInput').value, m = document.getElementById('muscleInput').value; if(w){ state.measure[new Date().toISOString().split('T')[0]] = {w, f, m}; save(); } };
        window.deleteLog = (type, key, sub = null) => { 
            if(sub === 'library') state.reading.library.splice(key, 1);
            else if(type === 'reading') delete state.reading.logs[key];
            else if(type === 'steps') delete state.steps[key];
            else if(type === 'diet') delete state.diet.logs[key];
            else if(type === 'measure') delete state.measure[key];
            save(); 
        };

        function renderAll() {
            renderCalendar();
            document.getElementById('dutyDatabase').innerHTML = state.dutyDB.map(d => `<div class="bg-indigo-500/20 px-3 py-1 rounded-full text-[9px] font-black border border-indigo-500/30">${d}</div>`).join('');
            document.getElementById('modalDutySelect').innerHTML = '<option value="">Baza...</option>' + state.dutyDB.map(d => `<option value="${d}">${d}</option>`).join('');
            
            const history = (id, map, type, u="", sub=null) => {
                const c = document.getElementById(id); c.innerHTML = '';
                Object.keys(map).sort((a,b)=>new Date(b)-new Date(a)).forEach(k => {
                    const v = map[k];
                    let val = typeof v === 'object' ? `${v.kcal || v.w}${u}` : `${v}${u}`;
                    c.innerHTML += `
                        <div class="bg-white/5 p-2 rounded-lg flex justify-between items-center text-[10px] border border-white/5">
                            <span class="font-mono text-slate-500 uppercase">${k}</span>
                            <span class="font-bold">${val}</span>
                            <button onclick="deleteLog('${type}', '${k}')" class="text-slate-600"><i class="fas fa-times"></i></button>
                        </div>`;
                });
            };

            history('readingHistory', state.reading.logs, 'reading', ' str.');
            history('stepsHistory', state.steps, 'steps', ' kr.');
            history('dietHistory', state.diet.logs, 'diet', ' kcal');
            history('measureHistory', state.measure, 'measure', ' kg');

            document.getElementById('libraryList').innerHTML = state.reading.library.map((b, i) => `
                <div class="bg-emerald-500/10 p-2 rounded-lg flex justify-between items-center text-[10px] border border-emerald-500/20">
                    <span class="font-bold text-emerald-400">${b.title}</span>
                    <button onclick="deleteLog('reading', ${i}, 'library')" class="text-slate-600"><i class="fas fa-times"></i></button>
                </div>`).join('');

            const years = new Set([new Date().getFullYear().toString()]);
            Object.keys(state.steps).forEach(d => years.add(d.split('-')[0]));
            document.getElementById('statsYearFilter').innerHTML = Array.from(years).map(y => `<option value="${y}">${y}</option>`).join('');

            updateHeader();
        }

        function updateHeader() {
            const today = new Date().toISOString().split('T')[0];
            const tasks = state.calendar[today] || [];
            const done = tasks.filter(t => t.done).length;
            const p = tasks.length ? Math.round((done/tasks.length)*100) : 0;
            document.getElementById('progressBar').style.width = p + '%';
            document.getElementById('progressText').innerText = p + '%';
            document.getElementById('currentStepsDisplay').innerText = (state.steps[today] || 0).toLocaleString();
        }

        document.getElementById('workoutDateInput').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
