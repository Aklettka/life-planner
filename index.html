<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .nav-btn.active { color: #4f46e5; border-top: 3px solid #4f46e5; margin-top: -3px; }
        .nav-btn:not(.active) { color: #94a3b8; }
        .workout-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th, td { white-space: nowrap; border-bottom: 1px solid #f1f5f9; padding: 12px 10px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #f1f5f9; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24">

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-6 rounded-b-[2.5rem] shadow-xl mb-6 sticky top-0 z-30">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 id="viewTitle" class="text-2xl font-bold">Planer</h1>
                <p id="todayDate" class="text-indigo-200 text-sm font-medium">Ładowanie...</p>
            </div>
            <div id="connectionStatus" class="bg-amber-500 p-2 px-3 rounded-full text-[10px] font-bold border border-white/20 uppercase tracking-widest text-white shadow-lg">Łączenie...</div>
        </div>
        
        <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md">
            <div class="flex justify-between items-center mb-1">
                <p class="text-[10px] uppercase tracking-wider text-indigo-100 font-bold">Postęp dnia</p>
                <span id="progressText" class="text-sm font-black">0%</span>
            </div>
            <div class="w-full bg-white/20 h-2.5 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-white h-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="px-4 max-w-lg mx-auto lg:max-w-full">
        <!-- Dashboard -->
        <section id="view-dashboard" class="view-section active space-y-6">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-5">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="currentMonthYear" class="font-bold text-lg text-slate-800"></h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-xl transition-colors"><i class="fas fa-chevron-left text-slate-400"></i></button>
                        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-xl transition-colors"><i class="fas fa-chevron-right text-slate-400"></i></button>
                    </div>
                </div>
                <div id="calendarDays" class="grid grid-cols-7 gap-2"></div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-5">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-layer-group text-indigo-500"></i> Baza zadań</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="dbInput" placeholder="Nowy szablon..." class="flex-1 bg-slate-50 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 ring-indigo-500 outline-none">
                    <button onclick="addToDatabase()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-95"><i class="fas fa-plus"></i></button>
                </div>
                <div id="dutyDatabase" class="flex flex-wrap gap-2"></div>
            </div>
        </section>

        <!-- Trening -->
        <section id="view-workout" class="view-section space-y-4">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-4">
                <div class="flex gap-2 mb-4">
                    <button onclick="switchWorkoutPlan(1)" id="btnPlan1" class="flex-1 py-3 rounded-2xl font-bold text-sm transition-all">Plan A</button>
                    <button onclick="switchWorkoutPlan(2)" id="btnPlan2" class="flex-1 py-3 rounded-2xl font-bold text-sm transition-all">Plan B</button>
                </div>

                <div class="flex flex-col gap-3 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Data treningu:</label>
                        <input type="date" id="workoutDateInput" onchange="renderWorkout()" class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-sm font-bold text-indigo-600 outline-none">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="exerciseInput" placeholder="Dodaj nowe ćwiczenie..." class="flex-1 bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 ring-indigo-500">
                        <button onclick="addExercise()" class="bg-indigo-600 text-white px-4 rounded-xl font-bold active:scale-95"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div class="workout-scroll rounded-xl border border-slate-100">
                    <table id="mainWorkoutTable">
                        <thead class="bg-slate-50">
                            <tr id="workoutTableHeader">
                                <th class="sticky-col bg-slate-50">Ćwiczenie</th>
                            </tr>
                        </thead>
                        <tbody id="workoutTableBody"></tbody>
                    </table>
                </div>
                
                <button onclick="saveWorkoutSession()" class="w-full mt-6 bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-700 active:scale-95 transition-all">
                    ZAPISZ SESJĘ TRENINGOWĄ
                </button>
            </div>
        </section>

        <!-- Widok Generyczny -->
        <section id="view-generic" class="view-section space-y-6">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
                <h3 id="genericInputTitle" class="font-bold text-slate-800 mb-4 uppercase tracking-wider text-[10px]">Dodaj wpis</h3>
                <div class="flex flex-col gap-3">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Data wpisu:</span>
                        <input type="date" id="genericDateInput" class="bg-slate-50 border border-slate-200 rounded-lg px-2 py-1 text-sm font-bold text-indigo-600 outline-none">
                    </div>
                    <div id="genericInputContainer" class="flex gap-2"></div>
                </div>
            </div>
            <div id="genericHistory" class="space-y-2"></div>
        </section>
    </main>

    <!-- Nawigacja -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t px-2 flex justify-around items-center z-40 h-20 shadow-lg">
        <button onclick="switchView('dashboard')" class="nav-btn active flex flex-col items-center justify-center gap-1 w-full h-full" data-view="dashboard"><i class="fas fa-calendar-check text-xl"></i><span class="text-[9px] font-black uppercase">Planer</span></button>
        <button onclick="switchView('workout')" class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full" data-view="workout"><i class="fas fa-dumbbell text-xl"></i><span class="text-[9px] font-black uppercase">Trening</span></button>
        <button onclick="switchView('reading')" class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full" data-view="reading"><i class="fas fa-book-open text-xl"></i><span class="text-[9px] font-black uppercase">Czytanie</span></button>
        <button onclick="switchView('steps')" class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full" data-view="steps"><i class="fas fa-shoe-prints text-xl"></i><span class="text-[9px] font-black uppercase">Kroki</span></button>
        <button onclick="switchView('diet')" class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full" data-view="diet"><i class="fas fa-utensils text-xl"></i><span class="text-[9px] font-black uppercase">Dieta</span></button>
        <button onclick="switchView('measure')" class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full" data-view="measure"><i class="fas fa-weight text-xl"></i><span class="text-[9px] font-black uppercase">Waga</span></button>
    </nav>

    <!-- Modal Dnia -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-6 w-full max-w-md shadow-2xl transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modalDateDisplay" class="font-black text-xl text-indigo-600"></h3>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
            <div id="selectedDayTasks" class="space-y-3 mb-6 max-h-64 overflow-y-auto pr-2 hide-scrollbar"></div>
            <div class="space-y-3 bg-slate-50 p-4 rounded-3xl">
                <select id="modalDutySelect" onchange="addFromDB(this.value)" class="w-full bg-white border border-slate-200 rounded-2xl p-3 text-sm outline-none"></select>
                <div class="flex gap-2">
                    <input type="text" id="customTaskInput" placeholder="Nowe zadanie..." class="flex-1 bg-white border border-slate-200 rounded-2xl p-3 text-sm outline-none">
                    <button onclick="addTaskToDay()" class="bg-indigo-600 text-white px-5 rounded-2xl font-bold"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'life-planner-v1';

        const defaultState = {
            dutyDB: ["Praca", "Trening", "Nauka"],
            calendar: {},
            reading: {},
            steps: {},
            diet: {},
            measure: {}, 
            workout: { 
                currentPlan: 1, 
                plans: { 
                    1: { exercises: [] }, 
                    2: { exercises: [] } 
                } 
            }
        };

        let user = null;
        let state = null;
        let activeView = 'dashboard';
        const todayStr = new Date().toISOString().split('T')[0];

        // Inicjalizacja dat w polach input
        window.onload = () => {
            document.getElementById('workoutDateInput').value = todayStr;
            document.getElementById('genericDateInput').value = todayStr;
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Auth error", e); }
        };
        initAuth();

        onAuthStateChanged(auth, (u) => {
            const statusBadge = document.getElementById('connectionStatus');
            if (u) {
                user = u;
                statusBadge.innerText = 'Online';
                statusBadge.classList.replace('bg-amber-500', 'bg-emerald-500');
                
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'main');
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        state = snap.data();
                        // Upewnienie się że struktura workout jest poprawna
                        if(!state.workout || !state.workout.plans) {
                            state.workout = JSON.parse(JSON.stringify(defaultState.workout));
                        }
                    } else {
                        state = JSON.parse(JSON.stringify(defaultState));
                        save();
                    }
                    renderAll();
                }, (err) => {
                    console.error("Firestore Error:", err);
                    statusBadge.innerText = 'Błąd Synchronizacji';
                    statusBadge.classList.replace('bg-emerald-500', 'bg-red-500');
                });
            }
        });

        async function save() {
            if (!user || !state) return;
            await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'main'), state);
        }

        // --- Widoki ---
        window.switchView = (v) => {
            activeView = v;
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`[data-view="${v}"]`);
            if (btn) btn.classList.add('active');

            if (['reading', 'steps', 'diet', 'measure'].includes(v)) {
                document.getElementById('view-generic').classList.add('active');
                renderGenericView(v);
            } else {
                document.getElementById(`view-${v}`).classList.add('active');
            }
            
            const titles = { dashboard: 'Planer', workout: 'Trening', reading: 'Czytanie', steps: 'Kroki', diet: 'Dieta', measure: 'Waga' };
            document.getElementById('viewTitle').innerText = titles[v] || 'Planer';
            renderAll();
        };

        // --- TRENING ---
        window.switchWorkoutPlan = (p) => { state.workout.currentPlan = p; save(); };
        window.addExercise = () => {
            const name = document.getElementById('exerciseInput').value;
            if (name && state) {
                state.workout.plans[state.workout.currentPlan].exercises.push({ name, sets: 4, history: {} });
                save();
                document.getElementById('exerciseInput').value = '';
            }
        };

        window.saveWorkoutSession = () => {
            const date = document.getElementById('workoutDateInput').value;
            if(!date) return alert("Wybierz datę!");
            
            const plan = state.workout.plans[state.workout.currentPlan];
            plan.exercises.forEach((ex, exIdx) => {
                const sessionData = [];
                for(let s=0; s<ex.sets; s++) {
                    const w = document.getElementById(`w-${exIdx}-${s}`).value;
                    const r = document.getElementById(`r-${exIdx}-${s}`).value;
                    sessionData.push({w: w || 0, r: r || 0});
                }
                ex.history[date] = sessionData;
            });
            save();
            alert(`Trening z dnia ${date} zapisany!`);
        };

        window.changeSets = (idx, delta) => {
            const ex = state.workout.plans[state.workout.currentPlan].exercises[idx];
            ex.sets = Math.max(1, Math.min(10, ex.sets + delta));
            save();
        };

        window.removeExercise = (idx) => {
            if(confirm("Usunąć ćwiczenie z planu?")) {
                state.workout.plans[state.workout.currentPlan].exercises.splice(idx, 1);
                save();
            }
        };

        window.deleteWorkoutHistory = (exIdx, date) => {
            if(confirm(`Usunąć historię z ${date}?`)) {
                delete state.workout.plans[state.workout.currentPlan].exercises[exIdx].history[date];
                save();
            }
        };

        function renderWorkout() {
            if (!state || !state.workout) return;
            const cp = state.workout.currentPlan;
            const plan = state.workout.plans[cp];
            const exercises = plan.exercises || [];
            const targetDate = document.getElementById('workoutDateInput').value || todayStr;

            document.getElementById('btnPlan1').className = cp === 1 ? 'flex-1 py-3 rounded-2xl font-black text-sm bg-indigo-600 text-white shadow-lg' : 'flex-1 py-3 rounded-2xl font-bold text-sm bg-white text-slate-400 border border-slate-100';
            document.getElementById('btnPlan2').className = cp === 2 ? 'flex-1 py-3 rounded-2xl font-black text-sm bg-indigo-600 text-white shadow-lg' : 'flex-1 py-3 rounded-2xl font-bold text-sm bg-white text-slate-400 border border-slate-100';

            const allDates = new Set();
            exercises.forEach(ex => Object.keys(ex.history || {}).forEach(d => { if(d !== targetDate) allDates.add(d) }));
            const sortedDates = Array.from(allDates).sort((a,b) => new Date(b) - new Date(a));

            const header = document.getElementById('workoutTableHeader');
            header.innerHTML = `<th class="sticky-col bg-slate-50 text-[10px] font-black text-slate-400 uppercase">Ćwiczenie</th>`;
            sortedDates.forEach(d => {
                header.innerHTML += `<th class="text-center text-[10px] font-black text-slate-300 uppercase">${d.split('-').reverse().join('.')}</th>`;
            });
            header.innerHTML += `<th class="text-center bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase">SESJA (${targetDate.split('-').reverse().join('.')})</th>`;

            const tbody = document.getElementById('workoutTableBody');
            if (exercises.length === 0) {
                tbody.innerHTML = `<tr><td colspan="100" class="p-10 text-center text-slate-300 italic text-sm">Brak ćwiczeń w tym planie. Dodaj pierwsze powyżej!</td></tr>`;
                return;
            }

            tbody.innerHTML = exercises.map((ex, exIdx) => {
                const activeSession = (ex.history && ex.history[targetDate]) ? ex.history[targetDate] : Array(ex.sets).fill({w:'', r:''});
                
                let historyCols = sortedDates.map(d => {
                    const hSession = ex.history[d] || [];
                    return `<td class="text-center text-[10px] text-slate-400 align-top group relative">
                        ${hSession.map(s => `<div>${s.w}x${s.r}</div>`).join('')}
                        <button onclick="deleteWorkoutHistory(${exIdx}, '${d}')" class="absolute top-0 right-0 p-1 opacity-0 group-hover:opacity-100 text-red-300"><i class="fas fa-times"></i></button>
                    </td>`;
                }).join('');

                let todayCol = `<td class="bg-indigo-50/40 p-2">
                    <div class="space-y-1">
                        ${Array.from({length: ex.sets}).map((_, sIdx) => {
                            const sVal = activeSession[sIdx] || {w:'', r:''};
                            return `<div class="flex gap-1 justify-center">
                                <input id="w-${exIdx}-${sIdx}" type="number" value="${sVal.w}" placeholder="kg" class="w-10 p-1 text-center rounded border border-indigo-100 text-[10px] outline-none">
                                <span class="text-indigo-200">x</span>
                                <input id="r-${exIdx}-${sIdx}" type="number" value="${sVal.r}" placeholder="powt" class="w-10 p-1 text-center rounded border border-indigo-100 text-[10px] outline-none">
                            </div>`;
                        }).join('')}
                    </div>
                </td>`;

                return `<tr>
                    <td class="sticky-col border-b bg-white">
                        <div class="font-bold text-xs text-slate-700">${ex.name}</div>
                        <div class="flex items-center gap-2 mt-2">
                             <button onclick="changeSets(${exIdx}, -1)" class="text-slate-300 hover:text-indigo-500"><i class="fas fa-minus-circle"></i></button>
                             <span class="text-[9px] font-black text-indigo-500 uppercase">${ex.sets} serii</span>
                             <button onclick="changeSets(${exIdx}, 1)" class="text-slate-300 hover:text-indigo-500"><i class="fas fa-plus-circle"></i></button>
                             <button onclick="removeExercise(${exIdx})" class="ml-auto text-red-200 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                    ${historyCols}
                    ${todayCol}
                </tr>`;
            }).join('');
        }

        // --- GENERYCZNE ---
        window.saveGeneric = (type) => {
            const date = document.getElementById('genericDateInput').value;
            if(!date || !state) return;
            if(!state[type]) state[type] = {};

            if (type === 'reading' || type === 'steps') {
                const v = parseInt(document.getElementById('genInp').value);
                if(!v) return;
                state[type][date] = (state[type][date] || 0) + v;
            } else if (type === 'diet') {
                const k = parseInt(document.getElementById('genKcal').value) || 0;
                const p = parseInt(document.getElementById('genProt').value) || 0;
                if(!state.diet[date]) state.diet[date] = {kcal:0, prot:0};
                state.diet[date].kcal += k; state.diet[date].prot += p;
            } else if (type === 'measure') {
                const w = document.getElementById('genW').value;
                const f = document.getElementById('genF').value;
                state.measure[date] = {w, f};
            }
            save();
        };

        window.deleteLog = (type, date) => {
            if(confirm("Usunąć?")) { delete state[type][date]; save(); }
        };

        function renderGenericView(type) {
            if (!state) return;
            const container = document.getElementById('genericInputContainer');
            const title = document.getElementById('genericInputTitle');
            const map = state[type] || {};
            
            const inputs = {
                reading: `<input type="number" id="genInp" placeholder="Strony" class="flex-1 bg-slate-100 rounded-xl p-3 text-sm font-bold outline-none">`,
                steps: `<input type="number" id="genInp" placeholder="Kroki" class="flex-1 bg-slate-100 rounded-xl p-3 text-sm font-bold outline-none">`,
                diet: `<input type="number" id="genKcal" placeholder="Kcal" class="flex-1 bg-slate-100 rounded-xl p-3 text-sm font-bold outline-none">
                       <input type="number" id="genProt" placeholder="Białko" class="flex-1 bg-slate-100 rounded-xl p-3 text-sm font-bold outline-none">`,
                measure: `<input type="number" step="0.1" id="genW" placeholder="Waga" class="flex-1 bg-slate-100 rounded-xl p-3 text-sm font-bold outline-none">
                          <input type="number" step="0.1" id="genF" placeholder="Fat%" class="flex-1 bg-slate-100 rounded-xl p-3 text-sm font-bold outline-none">`
            };

            title.innerText = `Logowanie: ${type}`;
            container.innerHTML = (inputs[type] || '') + `<button onclick="saveGeneric('${type}')" class="bg-indigo-600 text-white px-5 rounded-xl font-bold"><i class="fas fa-save"></i></button>`;

            const historyCont = document.getElementById('genericHistory');
            historyCont.innerHTML = Object.keys(map).sort((a,b) => new Date(b) - new Date(a)).map(date => {
                const val = map[date];
                let display = "";
                if (type === 'diet') display = `<b>${val.kcal}</b> kcal | <b>${val.prot}</b>g B`;
                else if (type === 'measure') display = `<b>${val.w}</b> kg | <b>${val.f}</b>%`;
                else display = `<b>${val}</b>`;

                return `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm group">
                    <div>
                        <span class="text-[10px] font-black text-slate-300 uppercase block">${date.split('-').reverse().join('.')}</span>
                        <span class="text-sm text-slate-700">${display}</span>
                    </div>
                    <button onclick="deleteLog('${type}', '${date}')" class="w-8 h-8 rounded-full bg-red-50 text-red-400 opacity-0 group-hover:opacity-100"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>`;
            }).join('');
        }

        // --- KALENDARZ ---
        let currentMonth = new Date();
        window.changeMonth = (dir) => { currentMonth.setMonth(currentMonth.getMonth() + dir); renderCalendar(); };
        
        function renderCalendar() {
            if (!state) return;
            const cont = document.getElementById('calendarDays');
            const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
            const names = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('currentMonthYear').innerText = `${names[m]} ${y}`;
            cont.innerHTML = '';
            
            const first = new Date(y, m, 1).getDay();
            const offset = first === 0 ? 6 : first - 1;
            for(let i=0; i<offset; i++) cont.innerHTML += '<div></div>';
            
            const daysCount = new Date(y, m+1, 0).getDate();
            for(let d=1; d<=daysCount; d++) {
                const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const tasks = state.calendar[key] || [];
                const doneCount = tasks.filter(t => t.done).length;
                const isToday = key === todayStr;
                
                cont.innerHTML += `
                    <div onclick="openModal('${key}')" class="h-16 border rounded-2xl flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-all ${isToday ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-100'}">
                        <span class="text-xs font-black">${d}</span>
                        ${tasks.length ? `<span class="text-[8px] font-bold ${isToday?'text-indigo-200':'text-indigo-400'}">${doneCount}/${tasks.length}</span>` : ''}
                    </div>`;
            }
        }

        // --- MODAL ---
        let activeDateKey = null;
        window.openModal = (k) => { 
            activeDateKey = k; 
            document.getElementById('modalDateDisplay').innerText = k.split('-').reverse().join('.'); 
            renderModalTasks(); 
            document.getElementById('modal').classList.remove('hidden'); 
        };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.addTaskToDay = () => {
            const val = document.getElementById('customTaskInput').value;
            if(val) {
                if(!state.calendar[activeDateKey]) state.calendar[activeDateKey] = [];
                state.calendar[activeDateKey].push({title: val, done: false});
                save();
                document.getElementById('customTaskInput').value = '';
            }
        };
        window.addFromDB = (val) => {
            if(!val) return;
            if(!state.calendar[activeDateKey]) state.calendar[activeDateKey] = [];
            state.calendar[activeDateKey].push({title: val, done: false});
            save();
            document.getElementById('modalDutySelect').value = "";
        };
        window.toggleTask = (i) => { state.calendar[activeDateKey][i].done = !state.calendar[activeDateKey][i].done; save(); };
        window.deleteTask = (i) => { state.calendar[activeDateKey].splice(i, 1); save(); };
        
        function renderModalTasks() {
            const tasks = state.calendar[activeDateKey] || [];
            document.getElementById('selectedDayTasks').innerHTML = tasks.length ? tasks.map((t, i) => `
                <div class="flex items-center gap-3 bg-white border border-slate-100 p-4 rounded-2xl">
                    <div onclick="toggleTask(${i})" class="w-6 h-6 flex items-center justify-center rounded-lg border-2 ${t.done?'bg-emerald-500 border-emerald-500 text-white':'border-slate-200'}">
                        ${t.done?'<i class="fas fa-check text-[10px]"></i>':''}
                    </div>
                    <span class="flex-1 text-sm font-bold ${t.done?'line-through text-slate-300':'text-slate-700'}">${t.title}</span>
                    <button onclick="deleteTask(${i})" class="text-slate-200 hover:text-red-400"><i class="fas fa-trash-alt"></i></button>
                </div>`).join('') : '<p class="text-center text-slate-300 text-sm py-4 italic">Brak zadań</p>';
        }

        window.addToDatabase = () => {
            const v = document.getElementById('dbInput').value;
            if(v) { state.dutyDB.push(v); save(); document.getElementById('dbInput').value = ''; }
        };

        function renderAll() {
            if (!state) return;
            renderCalendar();
            if (activeView === 'workout') renderWorkout();
            if (['reading', 'steps', 'diet', 'measure'].includes(activeView)) renderGenericView(activeView);
            
            const tasks = state.calendar[todayStr] || [];
            const done = tasks.filter(t => t.done).length;
            const p = tasks.length ? Math.round((done/tasks.length)*100) : 0;
            document.getElementById('progressBar').style.width = p + '%';
            document.getElementById('progressText').innerText = p + '%';
            document.getElementById('todayDate').innerText = "Dzisiaj, " + new Date().toLocaleDateString('pl-PL', {day:'numeric', month:'long'});

            document.getElementById('dutyDatabase').innerHTML = (state.dutyDB || []).map(d => `<div class="bg-white px-3 py-1.5 rounded-xl border border-slate-100 text-[9px] font-black text-indigo-500 uppercase shadow-sm">${d}</div>`).join('');
            document.getElementById('modalDutySelect').innerHTML = '<option value="">Wybierz szablon...</option>' + (state.dutyDB || []).map(d => `<option value="${d}">${d}</option>`).join('');
            
            if(!document.getElementById('modal').classList.contains('hidden')) renderModalTasks();
        }
    </script>
</body>
</html>
