<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .nav-btn.active { color: #6366f1; transform: translateY(-4px); }
        .nav-btn.active i { filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.4)); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 pb-24">

    <!-- Header -->
    <header class="bg-[#1e1b4b] text-white p-8 rounded-b-[3rem] shadow-2xl mb-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 id="viewTitle" class="text-3xl font-extrabold tracking-tight">Planer</h1>
                <p id="todayDate" class="text-indigo-300 font-medium">Inicjalizacja...</p>
            </div>
            <div id="statusDot" class="w-3 h-3 bg-amber-500 rounded-full shadow-[0_0_10px_rgba(245,158,11,0.8)]"></div>
        </div>
        
        <div class="bg-white/10 p-5 rounded-3xl backdrop-blur-md border border-white/10">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[11px] uppercase tracking-widest text-indigo-200 font-bold">Postęp dnia</p>
                <span id="progressText" class="text-sm font-black">0%</span>
            </div>
            <div class="w-full bg-black/20 h-3 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-indigo-400 to-cyan-400 h-full transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="px-5 max-w-lg mx-auto">
        <!-- Dashboard -->
        <section id="view-dashboard" class="view-section active space-y-6">
            <div class="bg-white rounded-[2.5rem] shadow-xl shadow-indigo-100/50 p-6 border border-indigo-50">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="currentMonthYear" class="font-extrabold text-xl text-slate-800"></h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 hover:bg-indigo-50 rounded-2xl transition-all text-slate-400"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 hover:bg-indigo-50 rounded-2xl transition-all text-slate-400"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div id="calendarDays" class="grid grid-cols-7 gap-3 text-center"></div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-xl shadow-indigo-100/50 p-6 border border-indigo-50">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2 text-sm uppercase tracking-wider"><i class="fas fa-database text-indigo-500"></i> Baza zadań</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="dbInput" placeholder="Nowy szablon..." class="flex-1 bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm focus:ring-2 ring-indigo-500 outline-none">
                    <button onclick="addToDatabase()" class="bg-indigo-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 active:scale-90 transition-transform"><i class="fas fa-plus"></i></button>
                </div>
                <div id="dutyDatabase" class="flex flex-wrap gap-2"></div>
            </div>
        </section>

        <!-- Trening -->
        <section id="view-workout" class="view-section space-y-4">
            <div class="bg-white rounded-[2.5rem] shadow-xl p-5 border border-indigo-50">
                <div class="flex gap-3 mb-5">
                    <button onclick="switchWorkoutPlan(1)" id="btnPlan1" class="flex-1 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all">Plan A</button>
                    <button onclick="switchWorkoutPlan(2)" id="btnPlan2" class="flex-1 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all">Plan B</button>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="date" id="workoutDateInput" onchange="renderWorkout()" class="bg-slate-50 border-none rounded-xl px-3 py-2 text-xs font-bold outline-none">
                    <input type="text" id="exerciseInput" placeholder="Dodaj ćwiczenie..." class="flex-1 bg-slate-50 border-none rounded-xl px-4 py-2 text-xs outline-none">
                    <button onclick="addExercise()" class="bg-indigo-600 text-white px-4 rounded-xl font-bold"><i class="fas fa-plus"></i></button>
                </div>
                <div class="overflow-x-auto rounded-2xl border border-slate-100">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] uppercase text-slate-400">
                            <tr id="workoutTableHeader"></tr>
                        </thead>
                        <tbody id="workoutTableBody" class="text-xs divide-y divide-slate-50"></tbody>
                    </table>
                </div>
                <button onclick="saveWorkoutSession()" class="w-full mt-6 bg-[#1e1b4b] text-white py-5 rounded-[2rem] font-black shadow-xl active:scale-95 transition-transform tracking-widest">ZAPISZ SESJĘ</button>
            </div>
        </section>

        <!-- Generic View (Steps, Reading, Diet, Measure) -->
        <section id="view-generic" class="view-section space-y-6">
            <div class="bg-white rounded-[2.5rem] shadow-xl p-6 border border-indigo-50">
                <div class="flex justify-between items-center mb-5">
                    <h3 id="genericInputTitle" class="font-bold text-slate-400 uppercase tracking-widest text-[10px]">Nowy wpis</h3>
                    <input type="date" id="genericDateInput" class="bg-indigo-50 text-indigo-600 rounded-lg px-3 py-1 text-xs font-bold outline-none">
                </div>
                <div id="genericInputContainer" class="flex gap-3"></div>
            </div>
            <div id="genericHistory" class="space-y-3"></div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center z-50 h-24 px-2">
        <button onclick="switchView('dashboard')" class="nav-btn active flex flex-col items-center gap-1 transition-all" data-view="dashboard"><i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] font-black uppercase tracking-tighter">Plan</span></button>
        <button onclick="switchView('workout')" class="nav-btn flex flex-col items-center gap-1 transition-all" data-view="workout"><i class="fas fa-dumbbell text-xl"></i><span class="text-[10px] font-black uppercase tracking-tighter">Siłka</span></button>
        <button onclick="switchView('reading')" class="nav-btn flex flex-col items-center gap-1 transition-all" data-view="reading"><i class="fas fa-book-open text-xl"></i><span class="text-[10px] font-black uppercase tracking-tighter">Książki</span></button>
        <button onclick="switchView('steps')" class="nav-btn flex flex-col items-center gap-1 transition-all" data-view="steps"><i class="fas fa-walking text-xl"></i><span class="text-[10px] font-black uppercase tracking-tighter">Kroki</span></button>
        <button onclick="switchView('diet')" class="nav-btn flex flex-col items-center gap-1 transition-all" data-view="diet"><i class="fas fa-utensils text-xl"></i><span class="text-[10px] font-black uppercase tracking-tighter">Dieta</span></button>
        <button onclick="switchView('measure')" class="nav-btn flex flex-col items-center gap-1 transition-all" data-view="measure"><i class="fas fa-chart-line text-xl"></i><span class="text-[10px] font-black uppercase tracking-tighter">Waga</span></button>
    </nav>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-end sm:items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[3rem] p-8 w-full max-w-md shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modalDateDisplay" class="font-black text-2xl text-indigo-900"></h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <div id="selectedDayTasks" class="space-y-3 mb-8 max-h-64 overflow-y-auto pr-2"></div>
            <div class="space-y-4">
                <select id="modalDutySelect" onchange="addFromDB(this.value)" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-medium outline-none"></select>
                <div class="flex gap-2">
                    <input type="text" id="customTaskInput" placeholder="Wpisz własne..." class="flex-1 bg-slate-50 border-none rounded-2xl p-4 text-sm outline-none">
                    <button onclick="addTaskToDay()" class="bg-indigo-600 text-white w-14 rounded-2xl font-bold shadow-lg shadow-indigo-100"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- STATE & CONFIG ---
        const SCHEMA = {
            dutyDB: ["Praca", "Trening", "Nauka", "Sprzątanie"],
            calendar: {},
            reading: {}, steps: {}, diet: {}, measure: {}, 
            workout: { currentPlan: 1, plans: { 1: { exercises: [] }, 2: { exercises: [] } } }
        };

        let state = JSON.parse(JSON.stringify(SCHEMA));
        let user = null; let db = null; let auth = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'life-planner-v1';
        const todayStr = new Date().toISOString().split('T')[0];
        let activeView = 'dashboard';
        let currentMonth = new Date();

        // Bezpieczna walidacja (naprawa starej bazy)
        function cleanData(d) {
            if (!d) return SCHEMA;
            return {
                dutyDB: Array.isArray(d.dutyDB) ? d.dutyDB : SCHEMA.dutyDB,
                calendar: d.calendar || {},
                reading: d.reading || {},
                steps: d.steps || {},
                diet: d.diet || {},
                measure: d.measure || {},
                workout: d.workout || SCHEMA.workout
            };
        }

        const startApp = async (conf) => {
            try {
                const app = initializeApp(conf);
                auth = getAuth(app);
                db = getFirestore(app);
                
                if (window['__initial_auth_token']) {
                    await signInWithCustomToken(auth, window['__initial_auth_token']);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        document.getElementById('statusDot').className = 'w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.8)]';
                        onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'main'), (snap) => {
                            state = cleanData(snap.data());
                            renderAll();
                        });
                    }
                });
            } catch (err) { console.error("Firebase fail:", err); }
        };

        // Wykrywanie configu
        const interval = setInterval(() => {
            if (window['__firebase_config']) {
                clearInterval(interval);
                startApp(JSON.parse(window['__firebase_config']));
            }
        }, 100);

        // --- UI ACTIONS ---
        window.save = async () => { if(user && db) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'main'), state); };

        window.renderAll = () => {
            const titles = { dashboard:'Planer', workout:'Trening', reading:'Czytanie', steps:'Kroki', diet:'Dieta', measure:'Waga' };
            document.getElementById('viewTitle').innerText = titles[activeView];
            document.getElementById('todayDate').innerText = new Date().toLocaleDateString('pl-PL', {weekday:'long', day:'numeric', month:'long'});
            
            renderCalendar();
            updateProgress();
            if (activeView === 'workout') renderWorkout();
            if (['reading', 'steps', 'diet', 'measure'].includes(activeView)) renderGenericView(activeView);
            
            document.getElementById('dutyDatabase').innerHTML = state.dutyDB.map(d => `<div class="bg-indigo-50 px-4 py-2 rounded-2xl text-[10px] font-bold text-indigo-600 uppercase border border-indigo-100">${d}</div>`).join('');
            document.getElementById('modalDutySelect').innerHTML = '<option value="">Wybierz szablon...</option>' + state.dutyDB.map(d => `<option value="${d}">${d}</option>`).join('');
        };

        window.switchView = (v) => {
            activeView = v;
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
            document.getElementById(v === 'dashboard' || v === 'workout' ? `view-${v}` : 'view-generic').classList.add('active');
            renderAll();
        };

        function updateProgress() {
            const tasks = state.calendar[todayStr] || [];
            const done = tasks.filter(t => t.done).length;
            const p = tasks.length ? Math.round((done/tasks.length)*100) : 0;
            document.getElementById('progressBar').style.width = p + '%';
            document.getElementById('progressText').innerText = p + '%';
        }

        function renderCalendar() {
            const cont = document.getElementById('calendarDays');
            const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
            const names = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('currentMonthYear').innerText = `${names[m]} ${y}`;
            cont.innerHTML = '';
            const firstDay = new Date(y, m, 1).getDay();
            const offset = firstDay === 0 ? 6 : firstDay - 1;
            for(let i=0; i<offset; i++) cont.innerHTML += '<div></div>';
            const days = new Date(y, m+1, 0).getDate();
            for(let d=1; d<=days; d++) {
                const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const t = state.calendar[key] || [];
                const isToday = key === todayStr;
                cont.innerHTML += `<div onclick="openModal('${key}')" class="h-16 rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all ${isToday?'bg-indigo-600 text-white shadow-lg shadow-indigo-200 scale-105 z-10':'bg-slate-50 text-slate-400 hover:bg-slate-100'}">
                    <span class="text-sm font-black">${d}</span>
                    ${t.length ? `<span class="text-[9px] font-bold mt-1 opacity-80">${t.filter(x=>x.done).length}/${t.length}</span>` : ''}
                </div>`;
            }
        }

        // WORKOUT
        window.switchWorkoutPlan = (p) => { state.workout.currentPlan = p; renderWorkout(); };
        window.addExercise = () => {
            const inp = document.getElementById('exerciseInput');
            if(inp.value) {
                state.workout.plans[state.workout.currentPlan].exercises.push({ name: inp.value, sets: 4, history: {} });
                save(); inp.value = '';
            }
        };
        function renderWorkout() {
            const cp = state.workout.currentPlan;
            const exercises = state.workout.plans[cp].exercises;
            const date = document.getElementById('workoutDateInput').value || todayStr;
            document.getElementById('workoutDateInput').value = date;

            document.getElementById('btnPlan1').className = cp === 1 ? 'flex-1 py-4 rounded-2xl bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'flex-1 py-4 bg-slate-50 text-slate-400';
            document.getElementById('btnPlan2').className = cp === 2 ? 'flex-1 py-4 rounded-2xl bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'flex-1 py-4 bg-slate-50 text-slate-400';

            const lastDate = Object.keys(exercises[0]?.history || {}).sort((a,b)=>new Date(b)-new Date(a)).find(d => d < date);

            document.getElementById('workoutTableHeader').innerHTML = `<th class="p-3">Ćwiczenie</th><th class="p-3">Poprzednio</th><th class="p-3">Dzisiaj</th>`;
            document.getElementById('workoutTableBody').innerHTML = exercises.map((ex, idx) => {
                const curr = ex.history[date] || Array(ex.sets).fill({w:'', r:''});
                const prev = lastDate ? ex.history[lastDate] : null;
                return `<tr>
                    <td class="p-3"><div class="font-bold text-slate-800">${ex.name}</div><div class="text-[9px] text-slate-400 uppercase font-bold">${ex.sets} Serie</div></td>
                    <td class="p-3 text-slate-300 font-medium">${prev ? prev.map(s=>`<div>${s.w}x${s.r}</div>`).join('') : '-'}</td>
                    <td class="p-3">${curr.map((s,si)=>`<div class="flex gap-1 mb-1"><input id="w-${idx}-${si}" value="${s.w}" placeholder="kg" class="w-8 bg-slate-50 rounded border-none p-1 text-center"><input id="r-${idx}-${si}" value="${s.r}" placeholder="pow" class="w-8 bg-slate-50 rounded border-none p-1 text-center"></div>`).join('')}</td>
                </tr>`;
            }).join('');
        }
        window.saveWorkoutSession = () => {
            const date = document.getElementById('workoutDateInput').value;
            state.workout.plans[state.workout.currentPlan].exercises.forEach((ex, i) => {
                ex.history[date] = Array.from({length:ex.sets}).map((_,s)=>({w:document.getElementById(`w-${i}-${s}`).value, r:document.getElementById(`r-${i}-${s}`).value}));
            });
            save(); alert("Sesja zapisana!");
        };

        // GENERIC (Steps/Reading/Diet/Measure)
        function renderGenericView(type) {
            document.getElementById('genericDateInput').value = todayStr;
            const forms = {
                reading: '<input type="number" id="g1" placeholder="Liczba stron" class="flex-1 p-4 rounded-2xl bg-slate-50 border-none outline-none">',
                steps: '<input type="number" id="g1" placeholder="Liczba kroków" class="flex-1 p-4 rounded-2xl bg-slate-50 border-none outline-none">',
                diet: '<input type="number" id="g1" placeholder="Kcal" class="flex-1 p-4 rounded-2xl bg-slate-50 border-none outline-none"><input type="number" id="g2" placeholder="Białko (g)" class="flex-1 p-4 rounded-2xl bg-slate-50 border-none outline-none">',
                measure: '<input type="number" step="0.1" id="g1" placeholder="Waga (kg)" class="flex-1 p-4 rounded-2xl bg-slate-50 border-none outline-none"><input type="number" step="0.1" id="g2" placeholder="Body Fat %" class="flex-1 p-4 rounded-2xl bg-slate-50 border-none outline-none">'
            };
            document.getElementById('genericInputContainer').innerHTML = forms[type] + `<button onclick="saveGeneric('${type}')" class="bg-indigo-600 text-white px-6 rounded-2xl shadow-lg"><i class="fas fa-check"></i></button>`;
            
            const data = state[type] || {};
            document.getElementById('genericHistory').innerHTML = Object.keys(data).sort((a,b)=>new Date(b)-new Date(a)).map(d => {
                const v = data[d];
                let label = type === 'diet' ? `${v.kcal} kcal | ${v.prot}g B` : (type === 'measure' ? `${v.w} kg | ${v.f}%` : v);
                return `<div class="bg-white p-5 rounded-[2rem] border border-slate-50 flex justify-between items-center shadow-sm">
                    <div><p class="text-[9px] font-black text-slate-300 uppercase">${d}</p><p class="font-bold text-slate-800">${label}</p></div>
                    <button onclick="deleteGeneric('${type}','${d}')" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-300 rounded-full"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>`;
            }).join('');
        }
        window.saveGeneric = (t) => {
            const d = document.getElementById('genericDateInput').value;
            if(t === 'diet') state[t][d] = { kcal: document.getElementById('g1').value, prot: document.getElementById('g2').value };
            else if(t === 'measure') state[t][d] = { w: document.getElementById('g1').value, f: document.getElementById('g2').value };
            else state[t][d] = document.getElementById('g1').value;
            save();
        };

        // MODAL & UTIL
        let activeKey = null;
        window.openModal = (k) => { activeKey = k; document.getElementById('modalDateDisplay').innerText = k; renderModalTasks(); document.getElementById('modal').classList.remove('hidden'); };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.renderModalTasks = () => {
            const tasks = state.calendar[activeKey] || [];
            document.getElementById('selectedDayTasks').innerHTML = tasks.map((t,i) => `
                <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-[1.5rem] transition-all">
                    <div onclick="toggleTask(${i})" class="w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all ${t.done?'bg-emerald-500 border-emerald-500 text-white':'border-slate-200'}">
                        ${t.done?'<i class="fas fa-check text-[10px]"></i>':''}
                    </div>
                    <span class="flex-1 font-bold text-sm ${t.done?'line-through text-slate-300':'text-slate-700'}">${t.title}</span>
                    <button onclick="delTask(${i})" class="text-slate-200 hover:text-red-400"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        };
        window.addTaskToDay = () => { const v = document.getElementById('customTaskInput').value; if(v){ if(!state.calendar[activeKey]) state.calendar[activeKey]=[]; state.calendar[activeKey].push({title:v,done:false}); save(); document.getElementById('customTaskInput').value=''; renderModalTasks(); } };
        window.addFromDB = (v) => { if(v){ if(!state.calendar[activeKey]) state.calendar[activeKey]=[]; state.calendar[activeKey].push({title:v,done:false}); save(); renderModalTasks(); } };
        window.toggleTask = (i) => { state.calendar[activeKey][i].done = !state.calendar[activeKey][i].done; save(); renderModalTasks(); };
        window.delTask = (i) => { state.calendar[activeKey].splice(i,1); save(); renderModalTasks(); };
        window.changeMonth = (dir) => { currentMonth.setMonth(currentMonth.getMonth()+dir); renderCalendar(); };
        window.addToDatabase = () => { const v = document.getElementById('dbInput').value; if(v){ state.dutyDB.push(v); save(); document.getElementById('dbInput').value=''; renderAll(); } };
        window.deleteGeneric = (t,d) => { delete state[t][d]; save(); renderGenericView(t); };
    </script>
</body>
</html>
